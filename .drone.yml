kind: pipeline
name: default
type: kubernetes

steps:
  - name: portal-build
    image: node:lts-alpine
    commands:
      - cd portal
      - npm ci
      - npm run build
  - name: server-test
    image: golang:1.22
    environment:
      GOPROXY: https://registry.test4x.com/repository/go-proxy/
    commands:
      - cd server
      - go test ./...
  - name: release-contract
    image: golang:1.22
    environment:
      GOPROXY: https://registry.test4x.com/repository/go-proxy/
    commands:
      - apt-get update
      - apt-get install -y --no-install-recommends nodejs npm jq
      - CI_VERSION="v0.0.${DRONE_BUILD_NUMBER:-0}"
      - bash scripts/test-release-contract.sh "${CI_VERSION}"
  - name: ipk-packaging-verify
    image: golang:1.22
    environment:
      GOPROXY: https://registry.test4x.com/repository/go-proxy/
    commands:
      - apt-get update
      - apt-get install -y --no-install-recommends nodejs npm jq
      - bash scripts/build-openwrt-ipk.sh --prepare-only
  - name: docs-lint
    image: alpine:latest
    commands:
      - apk add --no-cache grep
      - grep -r "transparent-proxy" docs/
      - grep -r "ipk" docs/
  - name: notification
    when:
      status:
        - success
        - failure
    image: docker.test4x.com/xgfan/drone-bark:9dccad32
    settings:
      token:
        from_secret: bark_token
      title: "{DRONE_REPO} {DRONE_BUILD_STATUS}"
      content: "{DRONE_COMMIT_MESSAGE}"
