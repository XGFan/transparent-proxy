name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v1.0.0, or 'latest')"
        required: false
        default: "latest"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      actions: read
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "tag=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: robinraju/release-downloader@v1.12
        with:
          tag: "${{ steps.version.outputs.tag }}"
          fileName: "*.ipk"
          out-file-path: /tmp/ipk-deploy
          token: ${{ github.token }}

      - name: Deploy to OpenWrt
        env:
          SSH_KEY: ${{ secrets.CI_SSH_KEY }}
          SSH_HOST: ${{ secrets.OPENWRT_HOST }}
          SSH_USER: ${{ secrets.OPENWRT_USER }}
        run: |
          DEPLOY_KEY=$(mktemp)
          echo "${SSH_KEY}" > "$DEPLOY_KEY"
          chmod 600 "$DEPLOY_KEY"
          ssh-keyscan -H "${SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

          SSH_OPTS="-i $DEPLOY_KEY -o StrictHostKeyChecking=accept-new"

          scp ${SSH_OPTS} /tmp/ipk-deploy/*.ipk "${SSH_USER}@${SSH_HOST}:/tmp/"
          ssh ${SSH_OPTS} "${SSH_USER}@${SSH_HOST}" << 'EOF'
            opkg install /tmp/transparent-proxy_*.ipk
            opkg install /tmp/luci-app-transparent-proxy_*.ipk
            /etc/init.d/transparent-proxy restart
            rm -f /tmp/*.ipk
          EOF

          rm -f "$DEPLOY_KEY"

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/ipk-deploy

      - name: Send Bark notification
        if: always() && env.BARK_TOKEN != ''
        env:
          BARK_TOKEN: ${{ secrets.BARK_TOKEN }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="deployed"
          else
            STATUS="deploy_failed"
          fi
          curl -s "https://api.day.app/${BARK_TOKEN}/${{ github.repository }}+CD+${STATUS}/${{ steps.version.outputs.tag }}"
