name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:

jobs:
  portal-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: portal/package-lock.json
      - run: cd portal && npm ci && npm run lint

  server-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - name: Create embed placeholder
        run: mkdir -p server/web/assets && touch server/web/index.html server/web/assets/.gitkeep
      - run: cd server && go vet ./... && go test ./...

  build-ipk:
    needs: [portal-lint, server-test]
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: portal/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v0.0.0-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build IPK packages
        run: bash scripts/build-openwrt-ipk.sh --version "${{ steps.version.outputs.tag }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ipk-packages
          path: dist/ipk/*/artifacts/*.ipk

  release:
    needs: [build-ipk]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ipk-packages
          path: ipk
      - name: Collect IPK files
        run: |
          mkdir -p release
          find ipk -name '*.ipk' -exec cp {} release/ \;
          ls -lh release/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" release/*.ipk \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes

  notification:
    runs-on: ubuntu-latest
    needs: [portal-lint, server-test, build-ipk]
    if: always() && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Send Bark notification
        run: |
          if [ "${{ needs.portal-lint.result }}" = "success" ] && \
             [ "${{ needs.server-test.result }}" = "success" ] && \
             [ "${{ needs.build-ipk.result }}" = "success" ]; then
            STATUS="success"
          else
            STATUS="failure"
          fi
          curl -s "https://api.day.app/${{ secrets.BARK_TOKEN }}/${{ github.repository }}+CI+${STATUS}/${{ github.ref_name }}"
