name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
    paths-ignore: ["**.md", LICENSE, "docs/**", ".claude/**", ".omc/**", ".gitignore"]
  pull_request:
    branches: [master]
    paths-ignore: ["**.md", LICENSE, "docs/**", ".claude/**", ".omc/**", ".gitignore"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  portal-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: portal/package-lock.json
      - run: cd portal && npm ci && npm run lint

  server-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - name: Create embed placeholder
        run: mkdir -p server/web/assets && touch server/web/index.html server/web/assets/.gitkeep
      - run: cd server && go vet ./... && go test ./...

  build-ipk:
    needs: [portal-lint, server-test]
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: portal/package-lock.json
      - uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v0.0.0-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build IPK packages
        run: bash scripts/build-openwrt-ipk.sh --version "${{ steps.version.outputs.tag }}"
      - uses: actions/upload-artifact@v7
        with:
          name: ipk-packages
          path: dist/ipk/*/artifacts/*.ipk

  release:
    needs: [build-ipk]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: ipk-packages
          path: ipk
      - name: Collect IPK files
        run: |
          mkdir -p release
          find ipk -name '*.ipk' -exec cp {} release/ \;
          ls -lh release/
      - uses: softprops/action-gh-release@v3
        with:
          files: release/*.ipk
          generate_release_notes: true

  latest-release:
    needs: [build-ipk]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: ipk-packages
          path: ipk
      - name: Collect IPK files
        run: |
          mkdir -p release
          find ipk -name '*.ipk' -exec cp {} release/ \;
          ls -lh release/
      - name: Delete previous latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete latest --repo "${{ github.repository }}" --yes 2>/dev/null || true
      - name: Force-update latest tag
        run: |
          git tag -f latest
          git push -f origin latest
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: "Latest (master)"
          body: "Rolling release from master branch (${{ github.sha }})"
          files: release/*.ipk
          prerelease: true

  notification:
    runs-on: ubuntu-latest
    needs: [portal-lint, server-test, build-ipk, release, latest-release]
    if: always()
    steps:
      - name: Send Bark notification
        if: env.BARK_TOKEN != ''
        env:
          BARK_TOKEN: ${{ secrets.BARK_TOKEN }}
        run: |
          FAILED=false
          for result in "${{ needs.portal-lint.result }}" "${{ needs.server-test.result }}" "${{ needs.build-ipk.result }}" "${{ needs.release.result }}" "${{ needs.latest-release.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              FAILED=true
            fi
          done
          if [ "$FAILED" = "true" ]; then STATUS="failure"; else STATUS="success"; fi
          curl -s "https://api.day.app/${BARK_TOKEN}/${{ github.repository }}+CI+${STATUS}/${{ github.ref_name }}"
